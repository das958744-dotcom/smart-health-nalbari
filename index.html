<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Health Nalbari</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        #result { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Smart Health (Nalbari)</h2>
    <p>আপোনাৰ নাম আৰু লক্ষণসমূহ লিখক:</p>
    <input type="text" id="name" placeholder="আপোনাৰ নাম">
    <input type="text" id="symptoms" placeholder="যেনে: জ্বৰ, কাহ, মূৰৰ বিষ">
    <button onclick="analyze()">পৰীক্ষা কৰক</button>

    <div id="result">
        <strong id="res_disease"></strong><br>
        <p id="res_doc"></p>
    </div>
</div>

<script>
    function analyze() {
        let symp = document.getElementById('symptoms').value.toLowerCase();
        let resDiv = document.getElementById('result');
        resDiv.style.display = "block";

        if(symp.includes("জ্বৰ") || symp.includes("fever")) {
            document.getElementById('res_disease').innerText = "সম্ভাব্য ৰোগ: ভাইৰেল ফিভাৰ";
            document.getElementById('res_doc').innerText = "নলবাৰীৰ ডাক্তৰ: Dr. Baruah (Nalbari Town)";
        } else {
            document.getElementById('res_disease').innerText = "অস্পষ্ট লক্ষণ";
            document.getElementById('res_doc').innerText = "অনুগ্ৰহ কৰি নলবাৰী মেডিকেল কলেজলৈ যাওক।";
        }
    }
</script>

</body>
</html>
